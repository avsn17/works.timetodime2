<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Kirbs | Maximum Pink Power</title>
    <style>
        :root {
            --kirby-pink: #ffafcc;
            --kirby-dark: #fb6f92;
            --cosmic-glow: #ff00ff;
            --gold: #ffd700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            background: #1a001a;
            color: white;
            height: 100vh;
        }

        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* Confetti & Dance */
        .confetti {
            position: fixed; width: 10px; height: 10px; 
            background-color: var(--kirby-pink);
            z-index: 1000; top: -10px;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @keyframes kirby-dance {
            0%   { transform: translateY(0) rotate(0deg); }
            25%  { transform: translateY(-20px) rotate(15deg); }
            50%  { transform: translateY(0) rotate(0deg) scaleX(-1); }
            75%  { transform: translateY(-20px) rotate(-15deg); }
            100% { transform: translateY(0) rotate(0deg) scaleX(1); }
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg) scale(1); }
            50% { transform: translateY(-20px) rotate(5deg) scale(1.1); }
            100% { transform: translateY(0px) rotate(0deg) scale(1); }
        }

        .kirby-sprite {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 4rem;
            animation: float 3s ease-in-out infinite;
            z-index: 10;
            filter: drop-shadow(0 0 15px var(--kirby-pink));
            user-select: none;
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(2px);
        }

        .header {
            background: rgba(20, 0, 20, 0.6);
            padding: 30px;
            border-radius: 30px;
            border: 3px solid var(--kirby-pink);
            box-shadow: 0 0 30px rgba(255, 175, 204, 0.4);
            text-align: center;
            margin-bottom: 20px;
        }

        .pilot-tag {
            color: var(--gold);
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .timer-display {
            font-size: 7rem;
            font-weight: bold;
            color: var(--kirby-pink);
            text-shadow: 0 0 40px var(--cosmic-glow), 0 0 10px white;
            margin: 10px 0;
        }

        .progress-container {
            width: 100%;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            border: 2px solid var(--kirby-pink);
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff8fab, #fb6f92, #ffc8dd, #fb6f92);
            background-size: 300% 100%;
            animation: shimmer 3s infinite linear;
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #471212;
        }

        @keyframes shimmer { 0% { background-position: 300% 0; } 100% { background-position: 0% 0; } }

        .controls { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; }

        button {
            padding: 15px 35px;
            border: 2px solid var(--kirby-pink);
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            background: rgba(255, 175, 204, 0.2);
            color: white;
            transition: 0.3s all;
            text-transform: uppercase;
        }

        button:hover { 
            background: var(--kirby-pink); 
            color: #1a001a;
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 10px 20px var(--cosmic-glow);
        }

        .chat-container {
            background: rgba(10, 0, 10, 0.85);
            border: 2px solid var(--kirby-pink);
            border-radius: 25px;
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chatMessages {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
            margin-bottom: 15px;
        }

        .msg { margin: 8px 0; padding: 10px; border-radius: 12px; animation: slideUp 0.3s ease; }
        .msg.bot { background: rgba(255, 175, 204, 0.1); border-left: 4px solid var(--kirby-pink); color: var(--kirby-pink); }
        .msg.user { background: rgba(255, 255, 255, 0.05); text-align: right; color: var(--gold); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-area { display: flex; gap: 10px; }
        input {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--kirby-pink);
            padding: 15px;
            border-radius: 15px;
            color: white;
            outline: none;
        }

        /* Setup Modal - Locked to Cosmic Kirbs */
        #setupModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2a002a 0%, #000000 100%);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="kirby-sprite" id="kirbySprite"> <( " )> </div>

    <div class="container">
        <div class="header">
            <div class="pilot-tag">>> Pilot: Cosmic Kirbs <<</div>
            <div class="timer-display" id="timerDisplay">25:00</div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
        </div>

        <div class="controls">
            <button onclick="startTimer()">Engage</button>
            <button onclick="pauseTimer()">Pause</button>
            <button onclick="resetTimer()">Reset</button>
        </div>

        <div class="chat-container">
            <div id="chatMessages">
                <div class="msg bot">Bot: Poyo! Ready to smash some goals, Cosmic Kirbs? (Try categories like 'lyrics', 'kirby', or 'heroic')</div>
            </div>
            <div class="input-area">
                <input type="text" id="chatInput" placeholder="Type category..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <div id="setupModal">
        <div style="text-align: center; border: 5px solid var(--kirby-pink); padding: 50px; border-radius: 40px; background: rgba(0,0,0,0.8);">
            <h1 style="color: var(--kirby-pink); font-size: 3rem; margin-bottom: 20px;">POYO!</h1>
            <p style="color: white; margin-bottom: 30px;">Maximum Pink Power Autoplay Engine Activated.</p>
            <button onclick="confirmEntry()" style="font-size: 1.5rem; padding: 20px 50px;">ENTER THE VOID</button>
        </div>
    </div>

    <audio id="audioPlayer" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Starfield Shader
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = Array.from({length: 200}, () => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height, 
                s: Math.random()*2, v: Math.random()*1.5 + 0.5
            }));
        }
        function animate() {
            ctx.fillStyle = '#0a000a'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#ffafcc';
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
                s.y += s.v; if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(animate);
        }
        window.onresize = initStars; initStars(); animate();

        
        function launchConfetti() {
            for (let i = 0; i < 50; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = ['#ffafcc', '#fb6f92', '#ff00ff', '#ffd700'][Math.floor(Math.random()*4)];
                c.style.animationDuration = (Math.random() * 3 + 2) + 's';
                c.style.opacity = Math.random();
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 5000);
            }
        }

        
        let partyInterval;
        function startPartyStars() {
            partyInterval = setInterval(() => {
                const colors = ['#ffafcc', '#fb6f92', '#ff00ff', '#ffd700', '#00ffff'];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                ctx.shadowBlur = 20;
                ctx.shadowColor = randomColor;
                stars.forEach(s => { s.v *= 1.5; s.s *= 1.2; });
            }, 500);
        }

        // Timer Logic
        let timeLeft = 1500, timerId = null;
        function updateUI() {
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timerDisplay').innerText = `${m}:${s<10?'0':''}${s}`;
            const p = ((1500-timeLeft)/1500)*100;
            const pb = document.getElementById('progressBar');
            pb.style.width = p + '%'; pb.innerText = Math.round(p) + '%';
        }

        function startTimer() { 
            if(timerId) return; 
            document.getElementById('audioPlayer').play().then(() => document.getElementById('audioPlayer').pause()); // Unlock audio
            timerId = setInterval(() => {
                if(timeLeft > 0) { timeLeft--; updateUI(); }
                else { 
                    clearInterval(timerId); 
                    
                    document.getElementById('audioPlayer').play(); 
                    document.getElementById('kirbySprite').classList.add('dancing'); launchConfetti(); startPartyStars();
                    document.getElementById('kirbySprite').innerText = '<( ^.^ )>';
 
                    document.getElementById('kirbySprite').innerText = "<( ^.^ )>";
                    alert("MISSION COMPLETE, COSMIC KIRBS!"); 
                }
            }, 1000);
        }
        function pauseTimer() { clearInterval(timerId); timerId = null; }
        function resetTimer() { pauseTimer(); timeLeft = 1500; updateUI(); }
        function confirmEntry() { document.getElementById('setupModal').style.display = 'none'; }

        // Catalog Integrated
        const QUOTES = {
            'kirby': ['<( " )> Poyo!', '<( o_o )> MAXIMUM PINK POWER.', '(> ^_^ )> Positive vibes!'],
            'lyrics': ['MJ: Speedin on the highway of life.', 'Lana: Heaven is a place on earth with you.', 'Billie: See me in a crown.', 'BeeGees: Stayin Alive!'],
            'heroic': ['Success is not final.', 'Fortune favors the brave.', 'Hard times create strong men.'],
            'iro': ['Hope is something you give yourself.', 'Tea with a stranger is a delight.'],
            'vibe': ['Main Character Energy detected.', 'No cap, you are based.']
        };

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const box = document.getElementById('chatMessages');
            const val = input.value.toLowerCase();
            if(!val) return;

            box.innerHTML += `<div class="msg user">You: ${val}</div>`;
            let resp = "Category not found. Try: lyrics, kirby, heroic, vibe, iro.";
            for(let key in QUOTES) { if(val.includes(key)) resp = QUOTES[key][Math.floor(Math.random()*QUOTES[key].length)]; }
            
        setTimeout(() => {
            box.innerHTML += `<div class="msg bot">Bot: ${resp}</div>`;
            box.scrollTop = box.scrollHeight;
        }, 400); // <-- Hier war die Klammer weg!
        
        input.value = "";
        }
    </script>
</body>
</html>
